name: Refresh NJIT course data
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# Runs the scraper on a schedule, commits the updated JSON back to the repo
# (which triggers a Vercel deploy). Also runnable on demand via the
# "Run workflow" button in the Actions tab.
#
# Cadence: every 3 hours. Section status (Open / Closed / Full) can flip
# minute-to-minute during peak registration, but free-tier minutes are
# limited and Vercel deploys on each commit, so a 3-hour rhythm is the
# sweet spot. Override with `workflow_dispatch` whenever a fresher pull
# is needed (e.g. right before the registration window opens).

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# Allow the workflow to push the regenerated JSON back to the repo using
# the default GITHUB_TOKEN.
permissions:
  contents: write

# Only one scrape may run at a time — prevents racing pushes if a manual
# dispatch overlaps a scheduled run. Queued runs are preserved (not
# cancelled) so we don't lose a manual trigger.
concurrency:
  group: scrape-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape course data
        run: npm run scrape

      - name: Commit & push if data changed
        run: |
          if [ -z "$(git status --porcelain public/data)" ]; then
            echo "::notice::No course-data changes detected; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data

          # Brief stats for the commit body so the history reads usefully.
          summary=$(node -e '
            const fs = require("fs");
            const terms = JSON.parse(fs.readFileSync("public/data/terms.json", "utf8"));
            const out = [];
            for (const t of terms) {
              try {
                const d = JSON.parse(fs.readFileSync("public/data/" + t.code + ".json", "utf8"));
                const sections = d.courses.reduce((n, c) => n + c.sections.length, 0);
                const closed = d.courses.reduce(
                  (n, c) => n + c.sections.filter(s => s.status === "Closed").length,
                  0,
                );
                out.push(`- ${t.description} (${t.code}): ${d.courses.length} courses, ${sections} sections, ${closed} closed`);
              } catch (e) {}
            }
            console.log(out.join("\n"));
          ')

          git commit -m "chore(data): refresh course data $(date -u +'%Y-%m-%d %H:%M UTC')" -m "$summary"

          # If another commit landed between scrape and push, rebase on top
          # of it and try once more. The JSON files are produced
          # deterministically by the scraper, so rebase conflicts on them
          # are resolved by re-running our scrape output.
          if ! git push; then
            git pull --rebase --strategy-option=theirs origin main
            git push
          fi
